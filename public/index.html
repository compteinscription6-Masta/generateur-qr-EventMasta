<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generateur QR - Universel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a2e;
            color: white;
            min-height: 100vh;
        }
        
        /* Header */
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 30px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .header p {
            opacity: 0.9;
            font-size: 1.1em;
        }
        
        /* Navigation */
        .nav {
            display: flex;
            justify-content: center;
            gap: 10px;
            padding: 20px;
            background: #16213e;
            flex-wrap: wrap;
        }
        
        .nav button {
            padding: 12px 25px;
            background: #0f3460;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 15px;
            transition: all 0.3s;
        }
        
        .nav button:hover {
            background: #e94560;
            transform: translateY(-2px);
        }
        
        .nav button.active {
            background: #e94560;
            font-weight: bold;
        }
        
        /* Sections */
        .section {
            display: none;
            padding: 30px;
            max-width: 1000px;
            margin: 0 auto;
        }
        
        .section.active {
            display: block;
        }
        
        .card {
            background: #16213e;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 20px;
            border: 1px solid #0f3460;
        }
        
        .card h2 {
            color: #e94560;
            margin-bottom: 20px;
            font-size: 1.5em;
        }
        
        /* Formulaires */
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #ddd;
            font-weight: 600;
        }
        
        input, select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #0f3460;
            border-radius: 8px;
            background: #1a1a2e;
            color: white;
            font-size: 16px;
        }
        
        input:focus, select:focus {
            border-color: #e94560;
            outline: none;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        
        @media (max-width: 600px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }
        
        /* Boutons */
        .btn {
            padding: 15px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #e94560 0%, #c73e54 100%);
            color: white;
            width: 100%;
            font-size: 1.1em;
            font-weight: bold;
        }
        
        .btn-primary:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }
        
        .btn-success {
            background: #28a745;
            color: white;
        }
        
        .btn-warning {
            background: #ffc107;
            color: #000;
        }
        
        .btn-danger {
            background: #dc3545;
            color: white;
        }
        
        .btn-secondary {
            background: #6c757d;
            color: white;
        }
        
        /* Liste événements */
        .event-list {
            display: grid;
            gap: 15px;
        }
        
        .event-item {
            background: #1a1a2e;
            padding: 20px;
            border-radius: 10px;
            border-left: 4px solid #e94560;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .event-info h3 {
            color: #fff;
            margin-bottom: 5px;
        }
        
        .event-info p {
            color: #aaa;
            font-size: 0.9em;
        }
        
        .event-actions {
            display: flex;
            gap: 10px;
        }
        
        /* QR Grid */
        .qr-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        
        .qr-item {
            background: white;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            color: #333;
            page-break-inside: avoid;
        }
        
        .qr-item img {
            width: 100%;
            max-width: 100px;
            height: auto;
            margin-bottom: 8px;
        }
        
        .qr-num {
            font-weight: bold;
            color: #e94560;
            font-size: 1.1em;
            margin-bottom: 5px;
        }
        
        .qr-code {
            font-family: monospace;
            font-size: 0.75em;
            background: #f0f0f0;
            padding: 4px 8px;
            border-radius: 4px;
            word-break: break-all;
        }
        
        /* Scanner */
        .scanner-box {
            text-align: center;
            padding: 40px;
        }
        
        #reader {
            width: 100% !important;
            max-width: 500px;
            margin: 20px auto;
            display: none;
        }
        
        .scan-btn {
            padding: 25px 50px;
            font-size: 1.3em;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 15px;
            cursor: pointer;
        }
        
        .result-scan {
            padding: 30px;
            border-radius: 15px;
            margin-top: 20px;
            display: none;
            text-align: center;
        }
        
        .result-scan.success {
            background: #d4edda;
            color: #155724;
            display: block;
        }
        
        .result-scan.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }
        
        /* Stats */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 20px;
        }
        
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 25px;
            border-radius: 15px;
            text-align: center;
        }
        
        .stat-number {
            font-size: 2.5em;
            font-weight: bold;
        }
        
        .stat-label {
            margin-top: 10px;
            opacity: 0.9;
        }
        
        /* Messages */
        .alert {
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        
        .alert-success {
            background: #d4edda;
            color: #155724;
            display: block;
        }
        
        .alert-error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }
        
        /* Print */
        @media print {
            body { background: white; color: black; }
            .no-print { display: none !important; }
            .section { display: block !important; padding: 10px; }
            .qr-grid { grid-template-columns: repeat(5, 1fr); gap: 10px; }
            .qr-item { border: 1px solid #ddd; }
            .card { background: white; border: 1px solid #ddd; color: black; }
            .card h2 { color: #333; }
        }
        
        @media (max-width: 768px) {
            .stats-grid { grid-template-columns: 1fr; }
            .event-actions { width: 100%; justify-content: stretch; }
            .event-actions button { flex: 1; }
        }
    </style>
</head>
<body>
    <!-- HEADER -->
    <div class="header no-print">
        <h1>🎫 Générateur QR Universel</h1>
        <p>Pour tous vos événements</p>
    </div>
    
    <!-- NAVIGATION -->
    <div class="nav no-print">
        <button class="active" onclick="showTab('events')">📋 Mes Événements</button>
        <button onclick="showTab('create')">➕ Nouvel Événement</button>
        <button onclick="showTab('scanner')">📱 Scanner</button>
    </div>

    <!-- SECTION : LISTE ÉVÉNEMENTS -->
    <div id="events" class="section active">
        <div class="card no-print">
            <h2>📋 Vos Événements</h2>
            <div id="eventsList" class="event-list">
                <p style="color: #aaa; text-align: center;">Chargement...</p>
            </div>
        </div>
    </div>

    <!-- SECTION : CRÉER ÉVÉNEMENT -->
    <div id="create" class="section">
        <div class="card no-print">
            <h2>➕ Créer un nouvel événement</h2>
            
            <div id="createAlert"></div>
            
            <div class="form-row">
                <div class="form-group">
                    <label>Nom de l'événement *</label>
                    <input type="text" id="evtName" placeholder="Ex: Soirée ALFA, Concert Gospel...">
                </div>
                <div class="form-group">
                    <label>Date *</label>
                    <input type="date" id="evtDate">
                </div>
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label>Prix</label>
                    <input type="text" id="evtPrice" placeholder="Ex: 5000">
                </div>
                <div class="form-group">
                    <label>Devise</label>
                    <select id="evtCurrency">
                        <option value="fc">FC (Francs Congolais)</option>
                        <option value="€">€ (Euros)</option>
                        <option value="$">$ (Dollars)</option>
                        <option value="fcfa">FCFA</option>
                    </select>
                </div>
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label>Lieu</label>
                    <input type="text" id="evtLocation" placeholder="Ex: Salle des Fêtes, Kinshasa">
                </div>
                <div class="form-group">
                    <label>Couleur du thème</label>
                    <select id="evtColor">
                        <option value="#ff0000">🔴 Rouge (ALFA)</option>
                        <option value="#0000ff">🔵 Bleu</option>
                        <option value="#00aa00">🟢 Vert</option>
                        <option value="#ffa500">🟠 Orange</option>
                        <option value="#800080">🟣 Violet</option>
                        <option value="#000000">⚫ Noir</option>
                        <option value="#ffd700">🟡 Or/Doré</option>
                    </select>
                </div>
            </div>
            
            <button class="btn btn-primary" onclick="createEvent()">
                💾 CRÉER L'ÉVÉNEMENT
            </button>
        </div>
    </div>

    <!-- SECTION : GÉNÉRER QR (cachée au début) -->
    <div id="generate" class="section">
        <div class="card no-print">
            <h2>🎫 Générer les QR Codes</h2>
            <div id="genEventInfo" style="margin-bottom: 20px; padding: 15px; background: #0f3460; border-radius: 8px;"></div>
            
            <div class="form-row">
                <div class="form-group">
                    <label>Nombre de QR codes</label>
                    <input type="number" id="qrQuantity" value="100" min="1" max="500">
                </div>
                <div class="form-group">
                    <label>Numéro de départ</label>
                    <input type="number" id="qrStart" value="1" min="1">
                </div>
            </div>
            
            <div class="form-group">
                <label>Préfixe des codes (ex: ALFA, EVT, VIP)</label>
                <input type="text" id="qrPrefix" value="ALFA" style="text-transform: uppercase;">
            </div>
            
            <button class="btn btn-primary" onclick="generateQRs()">
                🚀 GÉNÉRER LES QR CODES
            </button>
        </div>
        
        <div id="qrResult" style="display: none;">
            <div class="card no-print">
                <h2>🖨️ Impression</h2>
                <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                    <button class="btn btn-success" onclick="window.print()" style="flex: 1;">
                        🖨️ IMPRIMER
                    </button>
                    <button class="btn btn-warning" onclick="downloadAllQRs()" style="flex: 1;">
                        📥 Tout télécharger
                    </button>
                </div>
            </div>
            
            <div class="card">
                <h2 class="no-print">📄 Aperçu</h2>
                <div id="qrContainer" class="qr-grid"></div>
            </div>
        </div>
    </div>

    <!-- SECTION : SCANNER -->
    <div id="scanner" class="section">
        <div class="card scanner-box no-print">
            <h2 style="margin-bottom: 20px; color: #e94560;">📱 Contrôle des billets</h2>
            <p style="margin-bottom: 20px;">Sélectionnez d'abord un événement :</p>
            <select id="scanEventSelect" style="margin-bottom: 20px;">
                <option value="">Choisir un événement...</option>
            </select>
            <button class="scan-btn" onclick="startScanner()">
                ▶️ DÉMARRER LE SCAN
            </button>
            <div id="reader"></div>
        </div>
        
        <div id="scanResult" class="result-scan">
            <h2 id="scanTitle"></h2>
            <p id="scanText"></p>
            <button onclick="resetScan()" class="no-print btn btn-primary" style="margin-top: 20px;">
                Scanner suivant
            </button>
        </div>
    </div>

    <!-- SECTION : STATS -->
    <div id="stats" class="section">
        <div class="card">
            <h2>📊 Statistiques</h2>
            <div id="statsEventName" style="margin-bottom: 20px; font-size: 1.2em;"></div>
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-number" id="stTotal">0</div>
                    <div class="stat-label">Total QR</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="stUnused">0</div>
                    <div class="stat-label">Disponibles</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="stUsed">0</div>
                    <div class="stat-label">Utilisés</div>
                </div>
            </div>
            <button onclick="showTab('events')" class="no-print btn btn-secondary" style="margin-top: 20px;">
                ← Retour aux événements
            </button>
        </div>
    </div>

    <!-- SCRIPT -->
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <script>
        const API_URL = '';
        let currentEventId = null;
        let generatedQRs = [];
        let html5QrCode;

        // Navigation
        function showTab(tab) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
            
            document.getElementById(tab).classList.add('active');
            
            // Mettre à jour nav active
            const buttons = document.querySelectorAll('.nav button');
            if (tab === 'events') buttons[0].classList.add('active');
            if (tab === 'create') buttons[1].classList.add('active');
            if (tab === 'scanner') buttons[2].classList.add('active');
            
            if (tab === 'events') loadEvents();
        }

        // Charger événements
        async function loadEvents() {
            try {
                const res = await fetch(`${API_URL}/api/events`);
                const events = await res.json();
                
                const container = document.getElementById('eventsList');
                const scanSelect = document.getElementById('scanEventSelect');
                
                if (events.length === 0) {
                    container.innerHTML = '<p style="text-align: center; color: #aaa;">Aucun événement. Créez-en un !</p>';
                    return;
                }
                
                container.innerHTML = events.map(e => `
                    <div class="event-item">
                        <div class="event-info">
                            <h3>${e.name}</h3>
                            <p>📅 ${new Date(e.date).toLocaleDateString('fr-FR')} | 
                               💰 ${e.price} ${e.currency} | 
                               📍 ${e.location || 'Non précisé'}</p>
                        </div>
                        <div class="event-actions">
                            <button class="btn btn-success" onclick="openGenerate('${e.id}', '${e.name}', '${e.date}', '${e.price}', '${e.currency}')">
                                🎫 QR Codes
                            </button>
                            <button class="btn btn-secondary" onclick="viewStats('${e.id}', '${e.name}')">
                                📊 Stats
                            </button>
                            <button class="btn btn-danger" onclick="deleteEvent('${e.id}')">
                                🗑️
                            </button>
                        </div>
                    </div>
                `).join('');
                
                // Remplir select du scanner
                scanSelect.innerHTML = '<option value="">Choisir un événement...</option>' + 
                    events.map(e => `<option value="${e.id}">${e.name} - ${new Date(e.date).toLocaleDateString('fr-FR')}</option>`).join('');
                
            } catch (err) {
                console.error(err);
            }
        }

        // Créer événement
        async function createEvent() {
            const name = document.getElementById('evtName').value;
            const date = document.getElementById('evtDate').value;
            const price = document.getElementById('evtPrice').value;
            const currency = document.getElementById('evtCurrency').value;
            const location = document.getElementById('evtLocation').value;
            const color = document.getElementById('evtColor').value;
            
            if (!name || !date) {
                showAlert('createAlert', 'Veuillez remplir le nom et la date', 'error');
                return;
            }
            
            try {
                const res = await fetch(`${API_URL}/api/events`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, date, price, currency, location, color })
                });
                
                if (res.ok) {
                    showAlert('createAlert', '✅ Événement créé avec succès !', 'success');
                    // Reset form
                    document.getElementById('evtName').value = '';
                    document.getElementById('evtDate').value = '';
                    document.getElementById('evtPrice').value = '';
                    document.getElementById('evtLocation').value = '';
                    setTimeout(() => showTab('events'), 1500);
                }
            } catch (err) {
                showAlert('createAlert', 'Erreur lors de la création', 'error');
            }
        }

        function showAlert(id, msg, type) {
            const div = document.getElementById(id);
            div.className = 'alert alert-' + type;
            div.textContent = msg;
            setTimeout(() => div.style.display = 'none', 5000);
        }

        // Ouvrir section génération
        function openGenerate(id, name, date, price, currency) {
            currentEventId = id;
            document.getElementById('genEventInfo').innerHTML = `
                <strong>Événement:</strong> ${name}<br>
                <strong>Date:</strong> ${new Date(date).toLocaleDateString('fr-FR')}<br>
                <strong>Prix:</strong> ${price} ${currency}
            `;
            showTab('generate');
        }

        // Générer QR codes
        async function generateQRs() {
            const qty = document.getElementById('qrQuantity').value;
            const start = document.getElementById('qrStart').value;
            const prefix = document.getElementById('qrPrefix').value || 'EVT';
            
            try {
                const res = await fetch(`${API_URL}/api/generate-qr`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        eventId: currentEventId,
                        quantity: parseInt(qty),
                        startNumber: parseInt(start),
                        prefix: prefix.toUpperCase()
                    })
                });
                
                const data = await res.json();
                
                if (data.success) {
                    generatedQRs = data.codes;
                    displayQRs(data.codes);
                    document.getElementById('qrResult').style.display = 'block';
                }
            } catch (err) {
                alert('Erreur génération');
            }
        }

        function displayQRs(codes) {
            const container = document.getElementById('qrContainer');
            container.innerHTML = codes.map(c => `
                <div class="qr-item">
                    <div class="qr-num">N° ${c.num}</div>
                    <img src="${c.qrImage}" alt="QR">
                    <div class="qr-code">${c.code}</div>
                </div>
            `).join('');
        }

        function downloadAllQRs() {
            generatedQRs.forEach((c, i) => {
                setTimeout(() => {
                    const link = document.createElement('a');
                    link.download = `${c.code}.png`;
                    link.href = c.qrImage;
                    link.click();
                }, i * 150);
            });
        }

        // Voir stats
        async function viewStats(id, name) {
            currentEventId = id;
            document.getElementById('statsEventName').textContent = name;
            
            try {
                const res = await fetch(`${API_URL}/api/stats/${id}`);
                const stats = await res.json();
                
                document.getElementById('stTotal').textContent = stats.total || 0;
                document.getElementById('stUnused').textContent = stats.unused || 0;
                document.getElementById('stUsed').textContent = stats.used || 0;
                
                showTab('stats');
            } catch (err) {
                console.error(err);
            }
        }

        // Supprimer événement
        async function deleteEvent(id) {
            if (!confirm('Supprimer cet événement et tous ses QR codes ?')) return;
            
            try {
                await fetch(`${API_URL}/api/events/${id}`, { method: 'DELETE' });
                loadEvents();
            } catch (err) {
                alert('Erreur suppression');
            }
        }

        // Scanner
        async function startScanner() {
            const eventId = document.getElementById('scanEventSelect').value;
            if (!eventId) {
                alert('Veuillez sélectionner un événement');
                return;
            }
            
            document.getElementById('reader').style.display = 'block';
            html5QrCode = new Html5Qrcode("reader");
            
            try {
                await html5QrCode.start(
                    { facingMode: "environment" },
                    { fps: 10, qrbox: { width: 250, height: 250 } },
                    async (decodedText) => {
                        await html5QrCode.pause();
                        
                        try {
                            const res = await fetch(`${API_URL}/api/verify`, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ qrData: decodedText })
                            });
                            
                            const result = await res.json();
                            showScanResult(result);
                        } catch (e) {
                            showScanResult({ valid: false, error: 'Erreur' });
                        }
                    },
                    () => {}
                );
            } catch (err) {
                alert('Erreur caméra: ' + err);
            }
        }

        function showScanResult(result) {
            const box = document.getElementById('scanResult');
            const title = document.getElementById('scanTitle');
            const text = document.getElementById('scanText');
            
            box.className = 'result-scan ' + (result.valid ? 'success' : 'error');
            
            if (result.valid) {
                title.textContent = '✅ BILLET VALIDE';
                text.innerHTML = `
                    <strong>Événement:</strong> ${result.event}<br>
                    <strong>Code:</strong> ${result.code}<br>
                    <strong>Numéro:</strong> ${result.num}<br>
                    <br>
                    <span style="font-size: 1.3em;">🎉 ENTREE AUTORISEE 🎉</span>
                `;
            } else {
                title.textContent = '❌ BILLET INVALIDE';
                text.innerHTML = `
                    <strong>Problème:</strong> ${result.error}<br>
                    ${result.usedAt ? '<br>Déjà utilisé le: ' + new Date(result.usedAt).toLocaleString('fr-FR') : ''}
                `;
            }
        }

        function resetScan() {
            document.getElementById('scanResult').className = 'result-scan';
            document.getElementById('scanResult').style.display = 'none';
            html5QrCode.resume();
        }

        // Initialisation
        loadEvents();
    </script>
</body>
</html>
